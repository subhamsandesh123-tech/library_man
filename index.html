<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .form-section, .report-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input, select {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
        }

        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .entry-counter {
            text-align: center;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .report-table th,
        .report-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .report-table th {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
        }

        .report-table tr:hover {
            background-color: #f5f5f5;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
            font-style: italic;
        }

        .clear-btn {
            background: #dc3545;
            margin-top: 10px;
        }

        .clear-btn:hover {
            background: #c82333;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Library System</h1>
        
        <!-- Entry Counter -->
        <div class="entry-counter" id="entryCounter">
            Total Entries: <span id="totalEntries">0</span>
        </div>

        <!-- Student Entry Form -->
        <div class="form-section">
            <h2 style="color: #333; margin-bottom: 20px;">➕ Add New Student Entry</h2>
            <form id="studentForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>👤 Name *</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label>🎫 Roll Number *</label>
                        <input type="text" id="rollno" required>
                    </div>
                    <div class="form-group">
                        <label>📂 Section *</label>
                        <select id="section" required>
                            <option value="">Select Section</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="D">D</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>🪑 Seat Number</label>
                        <input type="text" id="seatno" placeholder="e.g., A-12">
                    </div>
                    <div class="form-group">
                        <label>📦 What did you bring? *</label>
                        <select id="brought" required>
                            <option value="">Select Item</option>
                            <option value="Book">Book</option>
                            <option value="Laptop">Laptop</option>
                            <option value="Notebook">Notebook</option>
                            <option value="None">None</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>📖 Book Code (if any)</label>
                        <input type="text" id="bookcode" placeholder="e.g., BK001">
                    </div>
                    <div class="form-group">
                        <label>⏰ Entry Time</label>
                        <input type="text" id="entrytime" readonly>
                    </div>
                    <div class="form-group">
                        <label>⏰ Exit Time</label>
                        <input type="text" id="exittime" readonly placeholder="Auto-filled on exit">
                    </div>
                </div>
                <button type="submit" class="btn">✅ Submit Entry</button>
            </form>
        </div>

        <!-- Report Section -->
        <div class="report-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: #333;">📊 Student Report</h2>
                <button type="button" class="btn clear-btn" onclick="clearAllData()">🗑️ Clear All Data</button>
            </div>
            <div id="reportTable">
                <div class="no-data">No entries yet. Add students above!</div>
            </div>
        </div>
    </div>

    <script>
        let studentData = JSON.parse(localStorage.getItem('libraryData')) || [];
        let entryCount = studentData.length;

        // Update entry counter
        function updateCounter() {
            document.getElementById('totalEntries').textContent = entryCount;
            localStorage.setItem('libraryData', JSON.stringify(studentData));
        }

        // Auto-fill current time for entry
        document.getElementById('entrytime').value = new Date().toLocaleString('en-IN', {
            timeZone: 'Asia/Kolkata',
            hour: '2-digit',
            minute: '2-digit',
            hour12: true
        });

        // Form submission
        document.getElementById('studentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const entry = {
                id: Date.now(),
                name: document.getElementById('name').value,
                rollno: document.getElementById('rollno').value,
                section: document.getElementById('section').value,
                seatno: document.getElementById('seatno').value || 'N/A',
                brought: document.getElementById('brought').value,
                bookcode: document.getElementById('bookcode').value || 'N/A',
                entrytime: document.getElementById('entrytime').value,
                exittime: document.getElementById('exittime').value || 'N/A',
                timestamp: new Date().toISOString()
            };

            studentData.unshift(entry); 
            entryCount++;
            
           
            this.reset();
            document.getElementById('entrytime').value = new Date().toLocaleString('en-IN', {
                timeZone: 'Asia/Kolkata',
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            });
            
            updateCounter();
            displayReport();
            
          
            alert('✅ Student entry added successfully!');
        });

        
        function displayReport() {
            const reportDiv = document.getElementById('reportTable');
            
            if (studentData.length === 0) {
                reportDiv.innerHTML = '<div class="no-data">No entries yet. Add students above!</div>';
                return;
            }

            let tableHTML = `
                <table class="report-table">
                    <thead>
                        <tr>
                            <th>S.No</th>
                            <th>Name</th>
                            <th>Roll No</th>
                            <th>Section</th>
                            <th>Seat</th>
                            <th>Brought</th>
                            <th>Book Code</th>
                            <th>Entry Time</th>
                            <th>Exit Time</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            studentData.forEach((student, index) => {
                tableHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${student.name}</td>
                        <td>${student.rollno}</td>
                        <td>${student.section}</td>
                        <td>${student.seatno}</td>
                        <td>${student.brought}</td>
                        <td>${student.bookcode}</td>
                        <td>${student.entrytime}</td>
                        <td>${student.exittime}</td>
                        <td>
                            <button onclick="updateExitTime(${student.id})" style="padding: 5px 10px; font-size: 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">
                                Update Exit
                            </button>
                        </td>
                    </tr>
                `;
            });

            tableHTML += '</tbody></table>';
            reportDiv.innerHTML = tableHTML;
        }

        
        function updateExitTime(id) {
            const student = studentData.find(s => s.id === id);
            if (student) {
                student.exittime = new Date().toLocaleString('en-IN', {
                    timeZone: 'Asia/Kolkata',
                    hour: '2-digit',
                    minute: '2-digit',
                    hour12: true
                });
                updateCounter();
                displayReport();
                alert('✅ Exit time updated!');
            }
        }

        
        function clearAllData() {
            if (confirm('Are you sure you want to delete all entries? This cannot be undone.')) {
                studentData = [];
                entryCount = 0;
                updateCounter();
                displayReport();
            }
        }

     
        window.onload = function() {
            updateCounter();
            displayReport();
        };
    </script>
</body>
</html>
